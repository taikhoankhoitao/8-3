<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>8/3 Magic World - Disney Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap');

        :root {
            --primary-pink: #d95c8f;
            --light-pink: #f3efec;
            --accent-gold: #d68b2a;
            --fox-orange: #c56a35;
            --soft-mauve: #c98bb3;
            --warm-brown: #7b4a2e;
            --image-bg: #f8f8f8;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            min-height: 100svh;
            overflow: hidden;
            background: var(--image-bg);
            font-family: 'Montserrat', sans-serif;
            user-select: none;
        }

        /* --- MÀN HÌNH CHÀO (INTRO) --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            min-height: 100svh;
            padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
            box-sizing: border-box;
            background: #ffffff;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1), visibility 1s;
            cursor: pointer;
        }

        #intro-screen img {
            width: 260px;
            
            animation: float 3s ease-in-out infinite;
        }

        #intro-screen h2 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary-pink);
            font-size: 2.5rem;
            margin-top: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* --- GIAO DIỆN CHÍNH --- */
        #main-ui {
            position: absolute;
            width: 100%; height: 100%;
            min-height: 100svh;
            padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
            box-sizing: border-box;
            opacity: 0;
            visibility: hidden;
            background: #ffffff;
            transition: opacity 1.5s ease;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        #wish-rain {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .falling-wish {
            position: absolute;
            top: -12vh;
            white-space: nowrap;
            font-family: 'Dancing Script', cursive;
            color: rgba(217, 92, 143, 0.82);
            text-shadow: 0 4px 12px rgba(217, 92, 143, 0.2);
            animation-name: wishFall;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
            user-select: none;
        }

        .container {
            position: relative;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            min-height: calc(100svh - var(--safe-top) - var(--safe-bottom));
            text-align: center;
            pointer-events: none;
            padding: 16px;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3.5rem, 12vw, 5.5rem);
            background: linear-gradient(45deg, var(--fox-orange), var(--primary-pink), var(--warm-brown));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(197, 106, 53, 0.22));
            animation: float 3s ease-in-out infinite;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            pointer-events: auto;
        }

        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(121, 74, 46, 0.18);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-card { background: linear-gradient(135deg, var(--primary-pink), var(--soft-mauve)); color: white; }
        .btn-gift { background: var(--accent-gold); color: white; }
        .btn-surprise { background: var(--fox-orange); color: white; }
        .btn:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 15px 30px rgba(121, 74, 46, 0.28); }

        #surprise-text {
            font-size: 1.15rem;
            line-height: 1.8;
        }

        /* --- MODAL --- */
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: min(450px, 90vw);
            background: rgba(255, 250, 247, 0.96);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            z-index: 200;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            max-height: calc(100svh - var(--safe-top) - var(--safe-bottom) - 24px);
            overflow-y: auto;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            border: 1px solid rgba(201, 139, 179, 0.3);
        }

        .modal.active { transform: translate(-50%, -50%) scale(1); opacity: 1; visibility: visible; }
        .modal h3 { font-family: 'Dancing Script', cursive; font-size: 2.5rem; color: var(--primary-pink); margin: 0 0 15px 0; }
        .modal p { line-height: 1.8; color: #5c4a41; font-size: 1.1rem; }
        .modal img { width: 100%; border-radius: 20px; margin-top: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .gift-img { width: min(260px, 70%); margin: 20px auto 0; display: block; }
        
        .close-btn { 
            margin-top: 25px; cursor: pointer; color: var(--primary-pink); 
            font-weight: 600; font-size: 0.9rem; letter-spacing: 1px;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(245, 235, 229, 0.72); z-index: 150;
            display: none; backdrop-filter: blur(5px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes wishFall {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(118vh) translateX(18px); opacity: 0.15; }
        }

        @media (max-width: 768px) {
            #intro-screen img { width: min(56vw, 260px); }
            #intro-screen h2 { font-size: clamp(1.8rem, 8vw, 2.4rem); margin-top: 18px; padding: 0 12px; }
            h1 { font-size: clamp(2.5rem, 14vw, 4.2rem); }
            .controls { gap: 12px; }
            .btn { padding: 12px 22px; font-size: 0.95rem; }
            .modal { padding: 24px 20px; border-radius: 22px; }
            .modal h3 { font-size: clamp(1.9rem, 9vw, 2.3rem); }
            .modal p { font-size: 1rem; }
            .falling-wish { text-shadow: 0 2px 8px rgba(217, 92, 143, 0.18); }
        }

        @supports (-webkit-touch-callout: none) {
            html, body { min-height: -webkit-fill-available; }
            #intro-screen, #main-ui { min-height: -webkit-fill-available; }
            .container { min-height: -webkit-fill-available; }
        }
    </style>
</head>
<body>

    <div id="intro-screen" onclick="startMagic()">
        <img src="image1.png" alt="Nick Wilde Disney">
        <h2>Chào mừng bạn đến với Thế giới phép thuật 8/3!</h2>
        <p style="color: #7f6a5e; margin-top: 10px;">(Chạm nhẹ vào màn hình để bắt đầu)</p>
    </div>

    <div id="main-ui">
        <canvas id="canvas"></canvas>
        <div id="wish-rain"></div>
        <div class="container">
            <h1>Happy Women's Day</h1>
            <div class="controls">
                <button class="btn btn-card" onclick="openModal('card-modal')">Lời yêu thương 💌</button>
                <button class="btn btn-gift" onclick="openModal('gift-modal')">Quà bé nhỏ 🎁</button>
                
            </div>
        </div>
    </div>

    <div id="card-modal" class="modal">
        <h3>Gửi Yêu của anh </h3>
        <p>8/3 siu vui siu tuyệt vơi nha em nhà a. Thích em nhiều ơi là nhiều lun mong là em luôn xinh đẹp mãi mãi lúc nào cũng thích a nhiều nhá hì hì</p>
        <div class="close-btn" onclick="closeModal()">ĐÓNG LẠI</div>
    </div>

    <div id="gift-modal" class="modal">
        <h3>Thơm em 1 tỷ cái✨</h3>
        <img class="gift-img" src="image.png" alt="Gift">
        <div class="close-btn" onclick="closeModal()">ĐÓNG LẠI</div>
    </div>


    <div id="overlay" class="overlay" onclick="closeModal()"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let magicStarted = false;
        let hasStarted = false;
        let wishRainInterval = null;

        const surpriseMessages = [
            "Hôm nay bạn tỏa sáng hơn cả pháo hoa, chúc bạn 8/3 thật rực rỡ!",
            "Bạn xứng đáng với mọi điều ngọt ngào nhất. Cười nhiều lên nhé!",
            "8/3 vui vẻ nha! Mong bạn luôn xinh đẹp, tự tin và hạnh phúc.",
            "Một lời chúc nhỏ: luôn được yêu thương, luôn là chính bạn thật tuyệt.",
            "Nếu hôm nay là phép màu, thì bạn chính là điều kỳ diệu nhất."
        ];

        const fallingWishes = [
            "8/3 vui ve nhá!",
            "Luôn xinh đẹp vui vẻ và hạnh phúc nhá!",
            "Cam on vi da den!",
            "Hôm nay cười nhiều em nhá!",
            "em Cún xinh iuuuu!",
            "Lím em 1 tỷ cái!",
            "611 mãi đỉnh mãi đỉnh!"
        ];

        // Sprite trái tim để tối ưu hiệu năng
        const heartSprite = new Image();
        heartSprite.src = "https://img.icons8.com/emoji/48/000000/heart-suit.png";

        function startMagic() {
            if (hasStarted) return;
            hasStarted = true;

            const intro = document.getElementById('intro-screen');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.visibility = 'hidden';
                const main = document.getElementById('main-ui');
                main.style.opacity = '1';
                main.style.visibility = 'visible';
                magicStarted = true;
                animate();
                startAutoFirework();
                startWishRain();
            }, 800);
        }

        function createFallingWish() {
            if (!magicStarted) return;

            const rainLayer = document.getElementById('wish-rain');
            const wish = document.createElement('span');
            wish.className = 'falling-wish';
            wish.textContent = fallingWishes[Math.floor(Math.random() * fallingWishes.length)];
            wish.style.left = `${Math.random() * 92 + 2}%`;
            wish.style.fontSize = `${(Math.random() * 0.9 + 1).toFixed(2)}rem`;
            wish.style.animationDuration = `${(Math.random() * 4 + 6).toFixed(2)}s`;

            rainLayer.appendChild(wish);
            wish.addEventListener('animationend', () => wish.remove());
        }

        function startWishRain() {
            if (wishRainInterval) return;

            for (let i = 0; i < 8; i++) {
                setTimeout(createFallingWish, i * 140);
            }

            wishRainInterval = setInterval(createFallingWish, 420);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 15 + 18;
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 7 + 4;
                this.speedX = Math.cos(angle) * force;
                this.speedY = Math.sin(angle) * force;
                this.opacity = 1;
                this.gravity = 0.12;
                this.friction = 0.95;
                this.rotation = Math.random() * Math.PI;
                this.spin = (Math.random() - 0.5) * 0.1;
            }
            update() {
                this.speedX *= this.friction;
                this.speedY *= this.friction;
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.015;
                this.rotation += this.spin;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                // Vẽ hiệu ứng Bloom/Glow nhẹ
                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(217, 92, 143, 0.45)";
                ctx.drawImage(heartSprite, -this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function spawnHearts(x, y, count) {
            for (let i = 0; i < count; i++) particles.push(new Particle(x, y));
        }

        window.addEventListener('pointerdown', (e) => {
            if(magicStarted && e.target.tagName !== 'BUTTON') {
                spawnHearts(e.clientX, e.clientY, 9);
            }
        });

        function startAutoFirework() {
            setInterval(() => {
                if(!document.querySelector('.modal.active')) {
                    const numPositions = Math.floor(Math.random() * 3) + 5; // 5 đến 7 chỗ
                    for (let l = 0; l < numPositions; l++) {
                        setTimeout(() => {
                            spawnHearts(Math.random()*canvas.width, Math.random()*canvas.height, 9);
                        }, Math.random() * 600);
                    }
                }
            }, 1000);
        }

        function animate() {
            // Nền sáng: vẽ đè lớp mờ để tạo hiệu ứng trail
            ctx.fillStyle = 'rgba(244, 235, 229, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0) { particles.splice(i, 1); i--; }
            }
            requestAnimationFrame(animate);
        }

        function openModal(id) {
            document.getElementById('overlay').style.display = 'block';
            document.getElementById(id).classList.add('active');
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        function triggerSurprise(e) {
            if (!magicStarted) return;

            const randomIndex = Math.floor(Math.random() * surpriseMessages.length);
            document.getElementById('surprise-text').textContent = surpriseMessages[randomIndex];

            const x = e && e.clientX ? e.clientX : window.innerWidth / 2;
            const y = e && e.clientY ? e.clientY : window.innerHeight / 2;
            spawnHearts(x, y, 35);

            // Tạo thêm vài đợt tim ngẫu nhiên để tăng cảm giác "wow"
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    spawnHearts(Math.random() * canvas.width, Math.random() * canvas.height * 0.7, 14);
                }, 150 * (i + 1));
            }

            openModal('surprise-modal');
        }
    </script>
</body>
</html>
